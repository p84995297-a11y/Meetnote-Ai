
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>Login - MeetNote AI</title>

    <link href="css/style.css" rel="stylesheet">

    </head>

    <body class="auth-page">

    <div class="auth-box">

        <h1>Login</h1>

        <input class="auth-input" type="email" id="email" placeholder="Email">

        <input class="auth-input" type="password" id="password" placeholder="Password">

        <button class="auth-btn" onclick="login()">Login</button>

        <p class="auth-caption">Don't have an account? <a class="muted-link" href="register.html">Register</a></p>

    </div>
<script>

function login(){

    const email =
        document.getElementById(
            "email"
        ).value;

    const password =
        document.getElementById(
            "password"
        ).value;

    const savedEmail =
        localStorage.getItem(
            "email"
        );

    const savedPassword =
        localStorage.getItem(
            "password"
        );

    if(
        email === savedEmail &&
        password === savedPassword
    ){
        alert("Login Success");
        window.location.href = "dashboard.html";
    }
    else{
        if (!savedEmail) {
            alert("No registered account found. Please register first.");
            return window.location.href = "register.html";
        }
        alert("Invalid Email or Password");
    }
}

</script>

</body>

</html>
