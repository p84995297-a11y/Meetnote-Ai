<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - All Users</title>
<link href="css/style.css" rel="stylesheet">
</head>
<body class="admin-page">
<header class="site-header">
    <div class="container">
        <div class="logo">MeetNote AI</div>
        <nav class="nav">
            <a class="nav-btn" href="admin.html">Back</a>
            <a class="nav-btn" href="index.html">Home</a>
            <a class="nav-btn" href="login.html">Logout</a>
        </nav>
    </div>
</header>
<main>
    <div class="container">
        <section class="admin-hero">
            <div class="badge">👑 All Users</div>
            <h1>All Users</h1>
            <p>Review registered users, their roles, and manage access from the admin console.</p>
        </section>
        <section class="table-card">
            <h2>Users</h2>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" style="text-align:center;color:#94a3b8;padding:24px;">No users found yet. Registered users will appear here.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
