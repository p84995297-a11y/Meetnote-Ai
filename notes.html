<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - All Notes</title>
<link href="css/style.css" rel="stylesheet">
</head>
<body class="admin-page">
<header class="site-header">
    <div class="container">
        <div class="logo">MeetNote AI</div>
        <nav class="nav">
            <a class="nav-btn" href="admin.html">Back</a>
            <a class="nav-btn" href="index.html">Home</a>
            <a class="nav-btn" href="login.html">Logout</a>
        </nav>
    </div>
</header>
<main>
    <div class="container">
        <section class="admin-hero">
            <div class="badge">📄 All Notes</div>
            <h1>All Notes</h1>
            <p>View generated notes, summaries, and transcript records managed by the system.</p>
        </section>
        <section class="table-card">
            <h2>Notes</h2>
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>File</th>
                        <th>Summary</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align:center;color:#94a3b8;padding:24px;">No notes generated yet. Upload a file and the notes will appear here.</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</main>
</body>
</html>
