
<!DOCTYPE html>
<html>

<head>

<title>Meeting History</title>


    <link href="css/style.css" rel="stylesheet">

    </head>

    <body class="history-page">

    <header class="site-header">
        <div class="container">
            <div class="logo">MeetNote AI</div>
            <nav class="nav">
                <a class="nav-btn" href="index.html">Home</a>
                <a class="nav-btn" href="dashboard.html">Dashboard</a>
                <a class="nav-btn" href="features.html">Features</a>
                <a class="nav-btn" href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main style="padding:80px 20px;">
        <div class="container">
            <h1 style="margin-bottom:18px;color:#0b1220">Meeting History</h1>
            <div id="history"></div>
        </div>
    </main>

<script>

async function loadHistory(){

    const response =
        await fetch(
            "http://127.0.0.1:8000/history"
        );

    const result =
        await response.json();

    const historyDiv =
        document.getElementById(
            "history"
        );

    historyDiv.innerHTML = "";

    result.history.forEach(item => {

        historyDiv.innerHTML += `

            <div class="card">

                <h3>${item.filename}</h3>

                <p>${item.summary}</p>

            </div>

        `;
    });

}

loadHistory();

</script>

</body>

</html>
